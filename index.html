<!DOCTYPE html>
<html lang="en">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1A2234 0%, #151B28 50%, #0D1117 100%);
      color: #c9d1d9; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
    }
    .logo {
      width: 100px; height: 100px; border-radius: 22px;
      background: linear-gradient(135deg, #6572A7, #5DB3E3);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px; font-size: 48px;

    h1 { color: #e6edf3; font-size: 32px; margin-bottom: 8px; }
    .tagline { color: #5DB3E3; font-size: 18px; margin-bottom: 32px; }

    .links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
    .links a {
      color: #5DB3E3; text-decoration: none; font-size: 14px;
      padding: 10px 20px; border: 1px solid #30363d; border-radius: 8px;
      transition: border-color 0.2s;
    }
    .links a:hover { border-color: #5DB3E3; }
    .store-links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
    .store-btn {
      display: inline-block; padding: 12px 28px; border-radius: 8px;
      background: linear-gradient(135deg, #6572A7, #5DB3E3);
      color: #fff; text-decoration: none; font-weight: 600; font-size: 15px;
      transition: opacity 0.2s;
    }
    .store-btn:hover { opacity: 0.9; }
    .footer { color: #484f58; font-size: 13px; margin-top: auto; padding-top: 40px; }
    .footer a { color: #484f58; }

  <div class="logo">🎵</div>
